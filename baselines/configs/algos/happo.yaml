# HAPPO 算法配置文件。
seed:
  # 是否使用指定的随机种子
  seed_specify: True
  # 随机种子
  seed: 1
device:
  # 是否使用 CUDA
  cuda: True
  # 是否设置 CUDA 确定性模式
  cuda_deterministic: True
  # torch.set_num_threads 的参数
  torch_threads: 4
train:
  # 训练数据收集的并行环境数
  n_rollout_threads: 20
  # 总训练步数
  num_env_steps: 10000000
  # 每次训练数据收集中每个环境的步数
  episode_length: 200
  # 日志记录间隔
  log_interval: 5
  # 评估间隔
  eval_interval: 25
  # 是否使用 ValueNorm
  use_valuenorm: True
  # 是否使用线性学习率衰减
  use_linear_lr_decay: False
  # 回合结束时是否区分截断和终止
  use_proper_time_limits: True
  # 若设置则从该目录加载模型，否则随机初始化
  model_dir: ~
eval:
  # 是否启用评估
  use_eval: True
  # 评估的并行环境数
  n_eval_rollout_threads: 10
  # 每次评估的回合数
  eval_episodes: 20
render:
  # 是否启用渲染
  use_render: False
  # 渲染的回合数
  render_episodes: 10
model:
  # 网络参数
  # 网络中 MLP 模块的隐藏层大小
  hidden_sizes: [128, 128]
  # 激活函数，可选 sigmoid、tanh、relu、leaky_relu、selu
  activation_func: relu
  # 是否使用特征归一化
  use_feature_normalization: True
  # 网络参数初始化方法，可选 xavier_uniform_、orthogonal_ 等
  initialization_method: orthogonal_
  # 网络输出层的增益
  gain: 0.01
  # 循环网络参数
  # 是否使用 RNN 策略（训练数据不分块）
  use_naive_recurrent_policy: False
  # 是否使用 RNN 策略（训练数据分块）
  use_recurrent_policy: False
  # 循环层数
  recurrent_n: 1
  # 数据块长度；仅在 use_recurrent_policy 为 True 时有效；episode_length 必须是其整数倍
  data_chunk_length: 10
  # 优化器参数
  # Actor 学习率
  lr: 0.0005
  # Critic 学习率
  critic_lr: 0.0005
  # Adam 优化器的 eps 参数
  opti_eps: 0.00001
  # Adam 优化器的 weight_decay 参数
  weight_decay: 0
  # 对角高斯分布参数
  std_x_coef: 1
  # 对角高斯分布参数
  std_y_coef: 0.5
algo:
  # PPO 参数
  # Actor 更新的迭代轮数
  ppo_epoch: 5
  # Critic 更新的迭代轮数
  critic_epoch: 5
  # 是否使用裁剪价值损失
  use_clipped_value_loss: True
  # 裁剪参数
  clip_param: 0.2
  # Actor 更新中每轮的小批量数
  actor_num_mini_batch: 1
  # Critic 更新中每轮的小批量数
  critic_num_mini_batch: 1
  # Actor 损失中熵项的系数
  entropy_coef: 0.01
  # 价值损失系数
  value_loss_coef: 1
  # 是否裁剪梯度范数
  use_max_grad_norm: True
  # 最大梯度范数
  max_grad_norm: 10.0
  # 是否使用广义优势估计（GAE）
  use_gae: True
  # 折扣因子
  gamma: 0.99
  # GAE lambda 参数
  gae_lambda: 0.95
  # 是否使用 Huber 损失
  use_huber_loss: True
  # 是否使用策略活跃掩码
  use_policy_active_masks: True
  # Huber 损失的 delta 参数
  huber_delta: 10.0
  # 多维动作概率的聚合方式，可选 prod、mean
  action_aggregation: prod
  # 是否在 Actor 之间共享参数
  share_param: False
  # 是否使用固定优化顺序
  fixed_order: False
logger:
  # 日志目录
  log_dir: "./results"
